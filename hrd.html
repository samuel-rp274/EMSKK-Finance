<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EMSKK Total Duty (HRD)</title>

<link rel="icon" href="logo.png" type="image/png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght=400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Inter', sans-serif;
}

body {
  background: #030712;
  color: #f8fafc;
  min-height: 100vh;
  overflow-x: hidden;
  overflow-y: auto;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: 100px 20px 40px 20px;
  position: relative;
}

.blob {
  position: fixed;
  width: 500px;
  height: 500px;
  border-radius: 50%;
  filter: blur(120px);
  opacity: 0.15;
  z-index: 0;
  pointer-events: none;
}
.blob.top-left { 
  background: #2563eb; 
  top: -150px; 
  left: -150px; 
}
.blob.bottom-right { 
  background: #10b981; 
  bottom: -150px; 
  right: -150px; 
}

.topnav {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  padding: 16px 24px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: rgba(15, 23, 42, 0.4);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(255, 255, 255, 0.05);
  z-index: 999;
}

.topnav {
  position: fixed; top:0; left:0; width:100%; padding:16px 24px;
  display:flex; justify-content:space-between; align-items:center;
  background: rgba(15,23,42,0.4); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(255,255,255,0.05); z-index: 999;
}
.topnav a { color:#cbd5e1; text-decoration:none; font-size:13px; font-weight:600; display:inline-flex; align-items:center; gap:6px; }
.topnav a:hover { color:#38bdf8; }
.topnav .title { font-size:12px; font-weight:700; color:#64748b; letter-spacing:1.5px; text-transform:uppercase; }
.topnav .nav-links { display:flex; align-items:center; gap:14px; }
.topnav .nav-sep { color:#334155; font-size:13px; font-weight:600; }

.container {
  width: 100%;
  max-width: 900px;
  z-index: 2;
}

.card-main {
  background: rgba(15, 23, 42, 0.4);
  border: 1px solid rgba(255, 255, 255, 0.05);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-radius: 24px;
  padding: 36px;
  width: 100%;
  position: relative;
  margin-bottom: 24px;
}

.card-main::before {
  content: "";
  position: absolute;
  top: 10%;
  left: 0;
  width: 3px;
  height: 80%;
  border-radius: 4px;
  background: #10b981;
  box-shadow: 0 0 15px #10b981;
}

.card-header-icon {
  width: 56px;
  height: 56px;
  background: rgba(16, 185, 129, 0.15);
  color: #10b981;
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 20px;
  box-shadow: inset 0 0 12px rgba(16, 185, 129, 0.2);
}

h2 {
  font-size: 28px;
  font-weight: 700;
  letter-spacing: 0.5px;
  margin-bottom: 6px;
}
h2 span.white { color: #ffffff; }
h2 span.gradient {
  background: linear-gradient(to right, #10b981, #059669);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.topbar {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  align-items: center;
  margin-top: 24px;
  margin-bottom: 16px;
  background: rgba(15, 23, 42, 0.6);
  padding: 14px;
  border-radius: 16px;
  border: 1px solid rgba(255, 255, 255, 0.03);
}

input[type="date"] {
  padding: 10px 16px;
  border-radius: 12px;
  border: 1px solid rgba(255, 255, 255, 0.05);
  background: rgba(15, 23, 42, 0.8);
  color: white;
  font-size: 13px;
  font-weight: 500;
  outline: none;
  cursor: pointer;
  transition: border-color 0.2s;
}

input[type="date"]:focus {
  border-color: rgba(16, 185, 129, 0.5);
}

button {
  padding: 10px 20px;
  border: none;
  border-radius: 12px;
  background: #10b981;
  color: #030712;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s ease;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2);
}

button:hover:not(:disabled) {
  transform: translateY(-1px);
  background: #059669;
}

button:disabled {
  background: #334155;
  color: #64748b;
  cursor: not-allowed;
  box-shadow: none;
}

.info {
  color: #94a3b8;
  font-size: 13px;
  font-weight: 500;
  margin-bottom: 16px;
  padding-left: 4px;
}

.table-wrap {
  background: rgba(15, 23, 42, 0.4);
  border: 1px solid rgba(255, 255, 255, 0.05);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-radius: 20px;
  overflow: hidden;
  width: 100%;
}

table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0;
}

th {
  background: rgba(15, 23, 42, 0.7);
  padding: 16px;
  text-align: center;
  color: #94a3b8;
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  border-bottom: 1px solid rgba(255, 255, 255, 0.05);
}

td {
  padding: 16px;
  border-bottom: 1px solid rgba(255, 255, 255, 0.03);
  text-align: center;
  font-size: 14px;
  color: #cbd5e1;
}

td:nth-child(2) {
  text-align: left;
  font-weight: 500;
}

tr:last-child td {
  border-bottom: none;
}

tr:hover td {
  background: rgba(255, 255, 255, 0.02);
  color: white;
}

.rank {
  color: #fbbf24;
  font-weight: 700;
}

tr:nth-child(1) .rank { color: #f59e0b; font-size: 16px; }
tr:nth-child(2) .rank { color: #cbd5e1; }
tr:nth-child(3) .rank { color: #b45309; }

.empty-state {
  color: #64748b;
  font-weight: 500;
  padding: 36px !important;
}

.footer-divider {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  margin-top: 40px;
  margin-bottom: 16px;
}
.footer-line {
  height: 1px;
  width: 120px;
  background: linear-gradient(to right, transparent, rgba(255,255,255,0.1), transparent);
}
.footer-logo {
  color: #64748b;
  width: 16px;
  height: 16px;
  opacity: 0.3;
}
.credits {
  text-align: center;
  font-size: 11px;
  color: #475569;
  letter-spacing: 0.5px;
}
.credits a {
  color: #3b82f6;
  text-decoration: none;
}
</style>
</head>
<body>
<div class="blob top-left"></div>
<div class="blob bottom-right"></div>

<div class="topnav">
  <div class="nav-links">
    <a href="index.html"><i data-lucide="arrow-left" style="width:16px;height:16px;"></i> User Menu</a>
    <span class="nav-sep">||</span>
    <a href="indexadminemskk.html"><i data-lucide="shield" style="width:16px;height:16px;"></i> Admin Menu</a>
  </div>
  <div class="title">EMSKK SYSTEM</div>
</div>

<div class="container">

<div class="card-main">
  <div class="card-header-icon">
    <i data-lucide="bar-chart-3"></i>
  </div>
  <h2><span class="white">EMSKK</span> <span class="gradient">TOTAL DUTY (HRD)</span></h2>

  <div class="topbar">
    <input type="date" id="startDate">
    <input type="date" id="endDate">
    <button id="btnGenerate" onclick="generate()" disabled>
      <i data-lucide="refresh-cw" class="animate-spin" id="btnIcon" style="width:14px; height:14px;"></i> 
      <span id="btnText">Isi tanggal terlebih dahulu</span>
    </button>
  </div>

  <div class="info" id="infoText">Mengambil data dari server, mohon tunggu...</div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th style="width: 80px;">Rank</th>
          <th>Nama</th>
          <th style="width: 180px;">Total Jam</th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <tr>
          <td colspan="3" class="empty-state">Data belum di-generate</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<div class="footer-divider">
  <div class="footer-line"></div>
  <i data-lucide="aperture" class="footer-logo"></i>
  <div class="footer-line"></div>
</div>
<div class="credits">SYSTEM BY <a href="#">SAMUEL</a></div>

</div>

<script>
lucide.createIcons();

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyM0aOVZwPSu2Pz0gn-DljKMm6FXmGgpxhu2fOZV9_HOG87WdsEbGmf7Bq18sdRIZ2kgg/exec";

let allData = [];

function parseDate(str){
  if(!str) return null;
  return new Date(str.replace(" ","T"));
}

function getDurationHours(s,f){
  const a = parseDate(s);
  const b = parseDate(f);
  if(!a || !b || isNaN(a) || isNaN(b)) return 0;
  return (b - a) / (1000 * 60 * 60);
}

async function loadData(){
  const btn = document.getElementById("btnGenerate");
  const btnText = document.getElementById("btnText");
  const infoText = document.getElementById("infoText");
  
  try {
    const res = await fetch(SCRIPT_URL + "?action=getAttendanceLogAll");
    allData = await res.json() || [];

    btn.disabled = false;
    btnText.innerText = "Generate";
    infoText.innerText = "Silakan masukkan rentang tanggal di atas.";

    const iconContainer = document.getElementById("btnIcon");
    iconContainer.setAttribute("data-lucide", "activity");
    lucide.createIcons();
    
  } catch (error) {
    console.error("Gagal memuat data:", error);
    infoText.innerText = "Gagal memuat data dari server. Silakan refresh halaman.";
    btnText.innerText = "Error";
  }
}

loadData();

function generate(){
  const startVal = document.getElementById("startDate").value;
  const endVal = document.getElementById("endDate").value;

  if(!startVal || !endVal){
    alert("Isi start & end date");
    return;
  }

  const startDate = new Date(startVal + "T00:00:00");
  const endDate = new Date(endVal + "T23:59:59");

  if(startDate > endDate){
    alert("Start harus <= End");
    return;
  }

  const map = {};

  allData.forEach(r => {
    if(!r.Start || r.Status !== "VALID") return;

    const d = parseDate(r.Start);
    if(!d) return;

    if(d < startDate || d > endDate) return;

    const name = (r.Nama || "").trim();
    if(!name) return;

    const h = getDurationHours(r.Start, r.Finish);
    map[name] = (map[name] || 0) + h;
  });

  const sorted = Object.entries(map).sort((a,b) => b[1] - a[1]);
  const tb = document.getElementById("tableBody");
  tb.innerHTML = "";

  if(sorted.length === 0){
    tb.innerHTML = `<tr><td colspan="3" class="empty-state">Tidak ada data ditemukan pada rentang ini</td></tr>`;
    document.getElementById("infoText").innerText = "Total user: 0";
    return;
  }

  sorted.forEach((x, i) => {
    let trophy = i + 1;
    if(i === 0) trophy = "🥇";
    if(i === 1) trophy = "🥈";
    if(i === 2) trophy = "🥉";

    const totalHours = Math.floor(x[1]);
    const totalMinutes = Math.round((x[1] % 1) * 60);

    tb.innerHTML += `
      <tr>
        <td class="rank">${trophy}</td>
        <td>${x[0]}</td>
        <td>${totalHours}h ${totalMinutes}m</td>
      </tr>
    `;
  });

  document.getElementById("infoText").innerText = `Total user: ${sorted.length}`;
}
</script>
</body>
</html>

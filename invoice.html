<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EMSKK Invoice Input</title>

<link rel="icon" href="logo.png" type="image/png">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/css/tom-select.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>

<style>
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: 'Inter', sans-serif;
}

body {
  background: #030712;
  color: #f8fafc;
  min-height: 100vh;
  overflow-x: hidden;
  overflow-y: auto;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: 100px 20px 40px 20px;
  position: relative;
}

.blob {
  position: fixed;
  width: 500px;
  height: 500px;
  border-radius: 50%;
  filter: blur(120px);
  opacity: 0.15;
  z-index: 0;
  pointer-events: none;
}
.blob.one { background: #3b82f6; top: -150px; left: -150px; }
.blob.two { background: #22c55e; bottom: -150px; right: -150px; }

.topnav {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  padding: 16px 24px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: rgba(15, 23, 42, 0.4);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(255, 255, 255, 0.05);
  z-index: 999;
}

.topnav a {
  color: #cbd5e1;
  text-decoration: none;
  font-size: 13px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: color 0.2s;
}

.topnav a:hover {
  color: #38bdf8;
}

.topnav .title {
  font-size: 12px;
  font-weight: 700;
  color: #64748b;
  letter-spacing: 1.5px;
  text-transform: uppercase;
}

.container {
  width: 100%;
  max-width: 650px;
  z-index: 2;
}

.card {
  background: rgba(15, 23, 42, 0.4);
  border: 1px solid rgba(255, 255, 255, 0.05);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-radius: 24px;
  padding: 36px;
  width: 100%;
  position: relative;
}

.card::before {
  content: "";
  position: absolute;
  top: 10%;
  left: 0;
  width: 3px;
  height: 80%;
  border-radius: 4px;
  background: #22c55e;
  box-shadow: 0 0 15px #22c55e;
}

.card-header-icon {
  width: 56px;
  height: 56px;
  background: rgba(34, 197, 94, 0.15);
  color: #22c55e;
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 20px;
  box-shadow: inset 0 0 12px rgba(34, 197, 94, 0.2);
}

h1 {
  font-size: 28px;
  font-weight: 700;
  letter-spacing: 0.5px;
  margin-bottom: 6px;
}
h1 span.white { color: #ffffff; }
h1 span.gradient {
  background: linear-gradient(to right, #22c55e, #4ade80);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.subtitle {
  color: #94a3b8;
  font-size: 13px;
  margin-bottom: 32px;
  line-height: 1.4;
}

.form-group {
    margin-bottom: 20px;
}

label {
    display: block;
    margin-bottom: 8px;
    font-size: 13px;
    font-weight: 600;
    color: #94a3b8;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

input, select {
    width: 100%;
    padding: 14px 16px;
    border: 1px solid rgba(255, 255, 255, 0.04);
    border-radius: 14px;
    background: rgba(15, 23, 42, 0.6);
    color: white;
    font-size: 14px;
    transition: all 0.2s;
}

input:focus, select:focus {
    outline: none;
    border-color: rgba(34, 197, 94, 0.4);
    box-shadow: 0 0 10px rgba(34, 197, 94, 0.1);
}

input[readonly] {
    opacity: 0.6;
    background: rgba(15, 23, 42, 0.3);
    cursor: not-allowed;
}

.hidden {
    display: none;
}

.total {
    margin-top: 28px;
    padding: 20px;
    background: rgba(255, 255, 255, 0.02);
    border: 1px solid rgba(255, 255, 255, 0.04);
    border-radius: 16px;
    font-size: 22px;
    font-weight: 700;
    color: #e2e8f0;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

#total {
    color: #22c55e;
}

button {
    margin-top: 24px;
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 14px;
    background: linear-gradient(135deg, #22c55e, #16a34a);
    color: white;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(34, 197, 94, 0.2);
    transition: all 0.2s;
}

button:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(34, 197, 94, 0.3);
}

button:active {
    transform: translateY(1px);
}

#status {
    text-align: center;
    margin-top: 20px;
    font-size: 14px;
    font-weight: 600;
}

.ts-wrapper.single .ts-control {
    background: rgba(15, 23, 42, 0.6) !important;
    border: 1px solid rgba(255, 255, 255, 0.04) !important;
    color: white !important;
    border-radius: 14px !important;
    padding: 14px 16px !important;
    font-size: 14px !important;
}
.ts-wrapper.focus .ts-control {
    border-color: rgba(34, 197, 94, 0.4) !important;
    box-shadow: 0 0 10px rgba(34, 197, 94, 0.1) !important;
}
.ts-control input { color: white !important; font-size: 14px !important; }
.ts-control input::placeholder { color: #64748b !important; }
.ts-dropdown {
    background: #0f172a !important;
    border: 1px solid rgba(255, 255, 255, 0.08) !important;
    color: white !important;
    border-radius: 14px !important;
    margin-top: 6px !important;
    box-shadow: 0 10px 25px rgba(0,0,0,0.5) !important;
    overflow: hidden !important;
}
.ts-dropdown .option { padding: 12px 16px !important; font-size: 14px !important; color: white !important; }
.ts-dropdown .active { background: rgba(34, 197, 94, 0.15) !important; color: #4ade80 !important; }

</style>
</head>
<body>
<div class="blob one"></div>
<div class="blob two"></div>

<div class="topnav">
  <a href="index.html"><i data-lucide="arrow-left" style="width: 16px; height: 16px;"></i> Home</a>
  <div class="title">EMSKK SYSTEM</div>
</div>

<div class="container">
<div class="card">
  <div class="card-header-icon">
    <i data-lucide="file-text"></i>
  </div>
  
  <h1><span class="white">EMSKK</span> <span class="gradient">INVOICE INPUT</span></h1>
  <div class="subtitle">Create and upload invoices records</div>

  <form id="invoiceForm">
    <div class="form-group">
      <label>Nama EMS</label>
      <select id="nama"></select>
    </div>

    <div class="form-group">
      <label>Jabatan</label>
      <input type="text" id="jabatan" readonly>
    </div>

    <div class="form-group">
      <label>Divisi</label>
      <input type="text" id="divisi" readonly>
    </div>

    <div class="form-group">
      <label>Tanggal Invoice</label>
      <input type="date" id="tanggalInvoice">
    </div>

    <div class="form-group">
      <label>Jenis Invoice</label>
      <select id="invoiceType">
        <option value="">Pilih Invoice</option>
      </select>
    </div>

    <div id="normalSection">
      <div class="form-group"><label>Harga</label><input type="number" id="harga" readonly min="0"></div>
      <div class="form-group"><label>Kuantitas</label><input type="number" id="qty" value="1" min="1"></div>
    </div>

    <div id="operasiSection" class="hidden">
      <div class="form-group"><label>Jenis Operasi</label><input type="text" id="jenisOperasi"></div>
      <div class="form-group"><label>Rawat Inap</label><select id="rawatInap"><option>Reguler</option><option>VIP</option><option>VVIP</option></select></div>
      <div class="form-group"><label>Pembayaran</label><select id="pembayaran"><option>BPJS</option><option>Non BPJS</option></select></div>
      <div class="form-group"><label>Harga</label><input type="number" id="hargaOperasi" min="0"></div>
      <div class="form-group"><label>Kuantitas</label><input type="number" id="qtyOperasi" value="1" min="1"></div>
    </div>

    <div id="suratSection" class="hidden">
      <div class="form-group"><label>Jenis Surat</label><input type="text" id="jenisSurat"></div>
      <div class="form-group"><label>Harga</label><input type="number" id="hargaSurat" min="0"></div>
      <div class="form-group"><label>Kuantitas</label><input type="number" id="qtySurat" value="1" min="1"></div>
    </div>

    <div id="lainSection" class="hidden">
      <div class="form-group"><label>Deskripsi</label><input type="text" id="deskripsiLain"></div>
      <div class="form-group"><label>Harga</label><input type="number" id="hargaLain" min="0"></div>
      <div class="form-group"><label>Kuantitas</label><input type="number" id="qtyLain" value="1" min="1"></div>
    </div>

    <div class="form-group"><label>Link Bukti Invoice</label><input type="url" id="bukti" placeholder="https://cdn.discordapp.com/..."></div>
    
    <div class="total">
      <span>Total Pembayaran</span>
      <span id="total">$KK 0</span>
    </div>
    
    <button type="submit">SIMPAN INVOICE</button>
    <div id="status"></div>
  </form>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/js/tom-select.complete.min.js"></script>
<script>
lucide.createIcons();

function getWIBDate() {
    const now = new Date();
    const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
    return new Date(utc + (7 * 60 * 60000));
}

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyM0aOVZwPSu2Pz0gn-DljKMm6FXmGgpxhu2fOZV9_HOG87WdsEbGmf7Bq18sdRIZ2kgg/exec";
const CACHE_KEY_EMS = "ems_cache_v1";
const CACHE_KEY_PRICE = "price_cache_v1";
const CACHE_TTL = 1000 * 60 * 15;

function isCacheValid(time){
  return (Date.now() - time) < CACHE_TTL;
}

const emsData = {};
const nama = document.getElementById("nama");
const jabatan = document.getElementById("jabatan");
const divisi = document.getElementById("divisi");
const harga = document.getElementById("harga");

const invoiceType = document.getElementById("invoiceType");
const status = document.getElementById("status");
const normalSection = document.getElementById("normalSection");
const operasiSection = document.getElementById("operasiSection");
const suratSection = document.getElementById("suratSection");
const lainSection = document.getElementById("lainSection");

const tanggalInvoice = document.getElementById("tanggalInvoice");

invoiceType.innerHTML = `<option value="">Pilih Invoice</option>`;

function loadPriceList(){
  const cached = localStorage.getItem(CACHE_KEY_PRICE);

  if(cached){
    try {
      const parsed = JSON.parse(cached);

      if(parsed && isCacheValid(parsed.time) && parsed.data?.length){
        injectPrice(parsed.data);
        return;
      }
    } catch(e){
      localStorage.removeItem(CACHE_KEY_PRICE);
    }
  }

  fetch(SCRIPT_URL + "?action=getPriceList")
    .then(res => res.json())
    .then(data => {
      const safe = data || [];
      localStorage.setItem(CACHE_KEY_PRICE, JSON.stringify({
        data: safe,
        time: Date.now()
      }));
      injectPrice(safe);
    });
}

function injectPrice(data){
    invoiceType.innerHTML = `<option value="">Pilih Invoice</option>`;

    data.forEach(item => {
        const opt = document.createElement("option");
        opt.value = item.label;
        opt.textContent = item.label;
        opt.dataset.price = item.price;
        invoiceType.appendChild(opt);
    });

    injectSpecialOptions();
}

function injectSpecialOptions() {
  const specialOptions = [
    { value: "operasi", text: "OPERASI" },
    { value: "surat", text: "SURAT" },
    { value: "lain", text: "LAIN-LAIN" }
  ];

  specialOptions.forEach(opt => {
    const el = document.createElement("option");
    el.value = opt.value;
    el.textContent = opt.text;
    invoiceType.appendChild(el);
  });
}

(function(){
    const now = getWIBDate();

    const start = new Date(now);
    start.setHours(0,0,0,0);

    const day = start.getDay(); 
    start.setDate(start.getDate() - day);

    const end = new Date(start);
    end.setDate(start.getDate() + 6);
    end.setHours(23,59,59,999);

    const formatDate = (d)=>{
        const y = d.getFullYear();
        const m = String(d.getMonth()+1).padStart(2,"0");
        const day = String(d.getDate()).padStart(2,"0");
        return `${y}-${m}-${day}`;
    };

    tanggalInvoice.min = formatDate(start);
    tanggalInvoice.max = formatDate(end);
})();

function loadEMS(){
  const cached = localStorage.getItem(CACHE_KEY_EMS);

  if(cached){
    try {
      const parsed = JSON.parse(cached);

      if(parsed && isCacheValid(parsed.time)){
        buildEMS(parsed.data);
        return;
      }
    } catch(e){
      localStorage.removeItem(CACHE_KEY_EMS);
    }
  }

  fetch(SCRIPT_URL + "?action=getEMS")
    .then(res => res.json())
    .then(data => {
      const safe = data || [];
      localStorage.setItem(CACHE_KEY_EMS, JSON.stringify({
        data: safe,
        time: Date.now()
      }));
      buildEMS(safe);
    })
    .catch(err => {
      console.error("EMS error:", err);
    });
}

function buildEMS(data){
  if(window.tomSelectNama){
    window.tomSelectNama.destroy();
    window.tomSelectNama = null;
  }

  nama.innerHTML = "";

    data.forEach(item => {
        if(item.nama){
            emsData[item.nama] = {
                jabatan: item.jabatan || "",
                divisi: item.divisi || ""
            };

            const option = document.createElement("option");
            option.value = item.nama;
            option.textContent = item.nama;
            nama.appendChild(option);
        }
    });

    window.tomSelectNama = new TomSelect("#nama", {
        placeholder: "Cari Nama EMS...",
        create: false,
        sortField: { field: "text", direction: "asc" }
    });

    tomSelectNama.on("change", (v) => {
        localStorage.setItem("ems_name", v);
        jabatan.value = emsData[v]?.jabatan || "";
        divisi.value = emsData[v]?.divisi || "";
    });

    const saved = localStorage.getItem("ems_name");
    if (saved && emsData[saved]) {
        tomSelectNama.setValue(saved);
    }
}

nama.addEventListener("change", () => {
    jabatan.value = emsData[nama.value]?.jabatan || "";
    divisi.value = emsData[nama.value]?.divisi || "";
});

document.getElementById("bukti").addEventListener("keydown", function(e){
    if(e.key === "Enter") e.preventDefault();
});

document.addEventListener("input", (e) => {
    const numIds = ["harga","hargaOperasi","hargaSurat","hargaLain","qty","qtyOperasi","qtySurat","qtyLain"];
    if(numIds.includes(e.target.id)){
        const el = e.target;
        if(el.id.includes("qty") && Number(el.value)<1) el.value=1;
        if(el.id.includes("harga") && Number(el.value)<0) el.value=0;
    }
});

function updateTotal(){
    let total = 0;
    const type = invoiceType.value;
    if(type==="operasi") total = (Number(hargaOperasi.value)||0)*(Number(qtyOperasi.value)||1);
    else if(type==="surat") total = (Number(hargaSurat.value)||0)*(Number(qtySurat.value)||1);
    else if(type==="lain") total = (Number(hargaLain.value)||0)*(Number(qtyLain.value)||1);
    else total = (Number(harga.value)||0)*(Number(qty.value)||1);
    document.getElementById("total").innerText = "$KK "+Number(total).toLocaleString("id-ID");
}

invoiceType.addEventListener("change", function () {
    normalSection.classList.add("hidden");
    operasiSection.classList.add("hidden");
    suratSection.classList.add("hidden");
    lainSection.classList.add("hidden");

    const selected = this.options[this.selectedIndex];
    const price = selected?.dataset?.price;

    if (this.value === "operasi") {
        operasiSection.classList.remove("hidden");
        harga.value = "";
    }
    else if (this.value === "surat") {
        suratSection.classList.remove("hidden");
        harga.value = "";
    }
    else if (this.value === "lain") {
        lainSection.classList.remove("hidden");
        harga.value = "";
    }
    else {
        normalSection.classList.remove("hidden");
        harga.value = price || 0;
    }
    updateTotal();
});

document.addEventListener("input", updateTotal);

document.getElementById("invoiceForm").addEventListener("submit", async (e)=>{
    e.preventDefault();
    if(!nama.value){ status.innerHTML = "⚠️ Pilih Nama EMS"; return; }
    if(!invoiceType.value){ status.innerHTML = "⚠️ Pilih Jenis Invoice"; return; }
    if(!document.getElementById("tanggalInvoice").value){ status.innerHTML = "⚠️ Pilih Tanggal Invoice"; return; }

    const bukti = document.getElementById("bukti").value;
    if (!bukti.includes("discord.com") && !bukti.includes("discordapp.com") && !bukti.includes("cdn.discordapp.com")) {
        status.innerHTML = "⚠️ Bukti harus link Discord"; return;
    }

    const jenis = invoiceType.value;
    let hargaFinal = 0;
    let qtyFinal = 1;
    if(jenis==="operasi"){ hargaFinal = Number(hargaOperasi.value)||0; qtyFinal = Number(qtyOperasi.value)||1; }
    else if(jenis==="surat"){ hargaFinal = Number(hargaSurat.value)||0; qtyFinal = Number(qtySurat.value)||1; }
    else if(jenis==="lain"){ hargaFinal = Number(hargaLain.value)||0; qtyFinal = Number(qtyLain.value)||1; }
    else{ hargaFinal = Number(harga.value)||0; qtyFinal = Number(qty.value)||1; }

    const payload = {
        nama: nama.value,
        jabatan: jabatan.value,
	    divisi: divisi.value,
        tanggalInvoice: document.getElementById("tanggalInvoice").value,
        jenisInvoice: invoiceType.options[invoiceType.selectedIndex].text,
        jenisOperasi: document.getElementById("jenisOperasi")?.value || "",
        rawatInap: document.getElementById("rawatInap")?.value || "",
        pembayaran: document.getElementById("pembayaran")?.value || "",
        jenisSurat: document.getElementById("jenisSurat")?.value || "",
        keterangan: document.getElementById("deskripsiLain")?.value || "",
        harga: hargaFinal,
        qty: qtyFinal,
        total: hargaFinal*qtyFinal,
        bukti: bukti||""
    };

    status.innerHTML = "⏳ Mengirim...";
    try{
        const yakin = confirm(`Nama: ${nama.value}\nInvoice: ${invoiceType.options[invoiceType.selectedIndex].text}\nTotal: $KK ${hargaFinal*qtyFinal}\nLanjut simpan?`);
        if(!yakin) return;
        await fetch(SCRIPT_URL,{method:"POST",body:JSON.stringify(payload)});
        status.innerHTML = "✅ Invoice berhasil disimpan";

		setTimeout(() => {
		status.textContent = "";
		}, 3000);
		
        const namaTerpilih = nama.value;

        document.getElementById("tanggalInvoice").value = "";
        document.getElementById("invoiceType").value = "";
        document.getElementById("bukti").value = "";

        normalSection.classList.remove("hidden");
        operasiSection.classList.add("hidden");
        suratSection.classList.add("hidden");
        lainSection.classList.add("hidden");

        harga.value = "";
        qty.value = 1;
        hargaOperasi.value = "";
        qtyOperasi.value = 1;
        hargaSurat.value = "";
        qtySurat.value = 1;
        hargaLain.value = "";
        qtyLain.value = 1;
        jenisOperasi.value = "";
        jenisSurat.value = "";
        deskripsiLain.value = "";

        document.getElementById("total").innerText = "$KK 0";

        tomSelectNama.setValue(namaTerpilih);
        jabatan.value = emsData[namaTerpilih]?.jabatan || "";
		divisi.value = emsData[namaTerpilih]?.divisi || "";
		
    } catch(err){
        console.error(err);
        status.innerHTML = "❌ Gagal mengirim invoice";
    }
});

loadEMS();
loadPriceList();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EMSKK Portal</title>

<link rel="icon" href="logo.png" type="image/png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Inter', sans-serif;
}

body {
  background: #030712; 
  color: white;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: 60px 20px;
  overflow-x: hidden;
  position: relative;
}

.blob {
  position: fixed;
  width: 500px;
  height: 500px;
  border-radius: 50%;
  filter: blur(120px);
  opacity: 0.15;
  z-index: 0;
  pointer-events: none;
}
.blob.top-left { background: #3b82f6; top: -150px; left: -150px; }
.blob.bottom-right { background: #22c55e; bottom: -150px; right: -150px; }

.container {
  width: 100%;
  max-width: 640px;
  z-index: 2;
  text-align: center;
}

h1 {
  font-size: 38px;
  font-weight: 700;
  letter-spacing: 1px;
  margin-top: 20px;
  margin-bottom: 8px;
  text-transform: uppercase;
}
h1 span.white { color: #ffffff; }
h1 span.gradient {
  background: linear-gradient(to right, #38bdf8, #c084fc);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.subtitle {
  color: #94a3b8;
  font-size: 14px;
  margin-bottom: 24px;
  letter-spacing: 0.5px;
}

.divider {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  margin-bottom: 36px;
}
.line {
  height: 1px;
  width: 100px;
  background: linear-gradient(to right, transparent, rgba(255,255,255,0.1), transparent);
}
.star {
  color: #a855f7;
  width: 14px;
  height: 14px;
  opacity: 0.7;
}

.menu-stack {
  display: flex;
  flex-direction: column;
  gap: 18px;
  margin-bottom: 48px;
}

.card {
  background: rgba(15, 23, 42, 0.4);
  border: 1px solid rgba(255, 255, 255, 0.05);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-radius: 20px;
  padding: 24px 28px;
  display: flex;
  align-items: center;
  gap: 20px;
  cursor: pointer;
  position: relative;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  text-align: left;
}

.card::before {
  content: "";
  position: absolute;
  top: 18%;
  left: 0;
  width: 3px;
  height: 64%;
  border-radius: 4px;
  transition: all 0.3s ease;
}

.card.attendance::before { background: #ef4444; box-shadow: 0 0 15px #ef4444; }
.card.attendance-overview::before { background: #f59e0b; box-shadow: 0 0 15px #f59e0b; }
.card.invoice-input::before { background: #10b981; box-shadow: 0 0 15px #10b981; }
.card.invoice-overview::before { background: #3b82f6; box-shadow: 0 0 15px #3b82f6; }

.icon-wrapper {
  width: 56px;
  height: 56px;
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.card.attendance .icon-wrapper { background: rgba(239, 68, 68, 0.15); color: #ef4444; box-shadow: inset 0 0 12px rgba(239, 68, 68, 0.2); }
.card.attendance-overview .icon-wrapper { background: rgba(245, 158, 11, 0.15); color: #f59e0b; box-shadow: inset 0 0 12px rgba(245, 158, 11, 0.2); }
.card.invoice-input .icon-wrapper { background: rgba(16, 185, 129, 0.15); color: #10b981; box-shadow: inset 0 0 12px rgba(16, 185, 129, 0.2); }
.card.invoice-overview .icon-wrapper { background: rgba(59, 130, 246, 0.15); color: #3b82f6; box-shadow: inset 0 0 12px rgba(59, 130, 246, 0.2); }

.card-content {
  flex-grow: 1;
}
.card-title {
  font-size: 17px;
  font-weight: 600;
  margin-bottom: 4px;
  color: #ffffff;
}
.card-desc {
  font-size: 13px;
  color: #94a3b8;
  line-height: 1.4;
}

.arrow-btn {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: 1px solid rgba(255, 255, 255, 0.1);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.3s ease;
}
.card.attendance .arrow-btn { color: #ef4444; border-color: rgba(239, 68, 68, 0.2); }
.card.attendance-overview .arrow-btn { color: #f59e0b; border-color: rgba(245, 158, 11, 0.2); }
.card.invoice-input .arrow-btn { color: #10b981; border-color: rgba(16, 185, 129, 0.2); }
.card.invoice-overview .arrow-btn { color: #3b82f6; border-color: rgba(59, 130, 246, 0.2); }

.card:hover {
  transform: translateY(-3px);
}

.card.attendance:hover { 
  border-color: rgba(239, 68, 68, 0.4); 
  box-shadow: 0 12px 30px rgba(239, 68, 68, 0.15), 
              inset 0 0 15px rgba(239, 68, 68, 0.05); 
}

.card.attendance-overview:hover { 
  border-color: rgba(245, 158, 11, 0.4); 
  box-shadow: 0 12px 30px rgba(245, 158, 11, 0.15), 
              inset 0 0 15px rgba(245, 158, 11, 0.05); 
}

.card.invoice-input:hover { 
  border-color: rgba(16, 185, 129, 0.4); 
  box-shadow: 0 12px 30px rgba(16, 185, 129, 0.15), 
              inset 0 0 15px rgba(16, 185, 129, 0.05); 
}

.card.invoice-overview:hover { 
  border-color: rgba(59, 130, 246, 0.4); 
  box-shadow: 0 12px 30px rgba(59, 130, 246, 0.15), 
              inset 0 0 15px rgba(59, 130, 246, 0.05); 
}

.card:hover .arrow-btn {
  background: currentColor;
  transform: translateX(10px);
}

.card:hover .arrow-btn i {
  color: #030712 !important;
}

.card:active { transform: scale(0.99); }

.footer-divider {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  margin-bottom: 16px;
}
.footer-logo {
  color: #94a3b8;
  width: 16px;
  height: 16px;
  opacity: 0.5;
}
.credits {
  font-size: 12px;
  color: #64748b;
}
.credits a {
  color: #3b82f6;
  text-decoration: none;
}

.fab-tutorial {
  position: fixed;
  bottom: 25px;
  right: 25px;
  width: 52px;
  height: 52px;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid rgba(255, 255, 255, 0.1);
  backdrop-filter: blur(10px);
  color: #e2e8f0;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  box-shadow: 0 10px 25px rgba(0,0,0,0.4);
  transition: 0.2s ease;
  z-index: 9998;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.2); }
  70% { box-shadow: 0 0 0 10px rgba(255, 255, 255, 0); }
  100% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0); }
}

.fab-tutorial:hover {
  transform: scale(1.08);
  background: rgba(255, 255, 255, 0.1);
}
.fab-tutorial::after {
  content: "Tutorial";
  position: absolute;
  right: 70px;
  background: #111827;
  color: white;
  padding: 6px 10px;
  font-size: 12px;
  border-radius: 8px;
  opacity: 0;
  transform: translateX(10px);
  transition: 0.2s ease;
  pointer-events: none;
  white-space: nowrap;
}
.fab-tutorial:hover::after {
  opacity: 1;
  transform: translateX(0);
}

</style>
</head>
<body>
<div class="blob top-left"></div>
<div class="blob bottom-right"></div>

<div class="container">
  <h1><span class="white">EMSKK</span> <span class="gradient">PORTAL</span></h1>
  <div class="subtitle">Finance Dashboard Navigation Hub</div>
  <div class="divider">
    <div class="line"></div>
    <i data-lucide="sparkles" class="star"></i>
    <div class="line"></div>
  </div>
  <div class="menu-stack">
    <div class="card attendance" onclick="go('attendance.html')">
      <div class="icon-wrapper">
        <i data-lucide="clock"></i>
      </div>
      <div class="card-content">
        <div class="card-title">Attendance</div>
        <div class="card-desc">Realtime on-duty tracking system</div>
      </div>
      <div class="arrow-btn">
        <i data-lucide="arrow-right" style="width: 16px; height: 16px;"></i>
      </div>
    </div>
    <div class="card attendance-overview" onclick="go('attendancelog.html')">
      <div class="icon-wrapper">
        <i data-lucide="bar-chart-3"></i>
      </div>
      <div class="card-content">
        <div class="card-title">Attendance Overview</div>
        <div class="card-desc">Weekly working hours & duty summary</div>
      </div>
      <div class="arrow-btn">
        <i data-lucide="arrow-right" style="width: 16px; height: 16px;"></i>
      </div>
    </div>
    <div class="card invoice-input" onclick="go('invoice.html')">
      <div class="icon-wrapper">
        <i data-lucide="credit-card"></i>
      </div>
      <div class="card-content">
        <div class="card-title">Invoice Input</div>
        <div class="card-desc">Create and upload invoices records</div>
      </div>
      <div class="arrow-btn">
        <i data-lucide="arrow-right" style="width: 16px; height: 16px;"></i>
      </div>
    </div>
    <div class="card invoice-overview" onclick="go('invoicelog.html')">
      <div class="icon-wrapper">
        <i data-lucide="trending-up"></i>
      </div>
      <div class="card-content">
        <div class="card-title">Invoice Overview</div>
        <div class="card-desc">Weekly invoice submission summary</div>
      </div>
      <div class="arrow-btn">
        <i data-lucide="arrow-right" style="width: 16px; height: 16px;"></i>
      </div>
    </div>
  </div>
  <div class="footer-divider">
    <div class="line" style="width: 150px;"></div>
    <i data-lucide="aperture" class="footer-logo"></i>
    <div class="line" style="width: 150px;"></div>
  </div>
  <div class="credits">System by <a href="#">Samuel</a></div>
</div>

<div class="fab-tutorial" onclick="go('tutorial.html')">
  <i data-lucide="book-open" style="width: 20px; height: 20px;"></i>
</div>
<script>
lucide.createIcons();

function go(page){
  window.location.href = page;
}
</script>
</body>
</html>

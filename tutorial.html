<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EMSKK Tutorial</title>

<link rel="icon" href="logo.png" type="image/png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Inter', sans-serif;
}

body {
  background: #030712; 
  color: #f8fafc;
  min-height: 100vh;
  overflow-x: hidden;
  overflow-y: auto;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: 100px 20px 40px 20px;
  position: relative;
}

.blob {
  position: fixed;
  width: 500px;
  height: 500px;
  border-radius: 50%;
  filter: blur(120px);
  opacity: 0.15;
  z-index: 0;
  pointer-events: none;
}
.blob.top-left { background: #3b82f6; top: -150px; left: -150px; }
.blob.bottom-right { background: #22c55e; bottom: -150px; right: -150px; }

.topnav {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  padding: 16px 24px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: rgba(15, 23, 42, 0.4);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(255, 255, 255, 0.05);
  z-index: 999;
}

.topnav a {
  color: #cbd5e1;
  text-decoration: none;
  font-size: 13px;
  font-weight: 600;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  transition: color 0.2s;
}

.topnav a:hover {
  color: #38bdf8;
}

.topnav .title {
  font-size: 12px;
  font-weight: 700;
  color: #64748b;
  letter-spacing: 1.5px;
  text-transform: uppercase;
}

.container {
  width: 100%;
  max-width: 800px;
  z-index: 2;
}

.header {
  text-align: center;
  margin-bottom: 36px;
}

.header h1 {
  font-size: 32px;
  font-weight: 800;
  letter-spacing: 0.5px;
  margin-bottom: 8px;
}

.header h1 span.white { color: #ffffff; }
.header h1 span.gradient {
  background: linear-gradient(to right, #38bdf8, #c084fc);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.header p {
  color: #64748b;
  font-size: 14px;
  font-weight: 500;
}

.card {
  background: rgba(15, 23, 42, 0.4);
  border: 1px solid rgba(255, 255, 255, 0.05);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-radius: 24px;
  padding: 28px;
  margin-bottom: 20px;
  position: relative;
}

.card::before {
  content: "";
  position: absolute;
  top: 12%;
  left: 0;
  width: 3px;
  height: 76%;
  border-radius: 4px;
}

.card h2 {
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.card ul {
  padding-left: 20px;
}

.card li {
  font-size: 14px;
  color: #cbd5e1;
  line-height: 1.7;
  margin-bottom: 8px;
}

.card.attendance::before { background: #ef4444; box-shadow: 0 0 15px #ef4444; }
.card.attendance h2 { color: #ef4444; }
.card.attendance li::marker { color: #ef4444; }
.card.attendance .highlight {
  color: #ef4444;
  background: rgba(239, 68, 68, 0.1);
  padding: 2px 6px;
  border-radius: 6px;
  border: 1px solid rgba(239, 68, 68, 0.2);
  font-weight: 600;
}

.card.attendance-overview::before { background: #f59e0b; box-shadow: 0 0 15px #f59e0b; }
.card.attendance-overview h2 { color: #f59e0b; }
.card.attendance-overview li::marker { color: #f59e0b; }

.card.invoice-input::before { background: #10b981; box-shadow: 0 0 15px #10b981; }
.card.invoice-input h2 { color: #10b981; }
.card.invoice-input li::marker { color: #10b981; }

.card.invoice-overview::before { background: #3b82f6; box-shadow: 0 0 15px #3b82f6; }
.card.invoice-overview h2 { color: #3b82f6; }
.card.invoice-overview li::marker { color: #3b82f6; }

.note {
  margin-top: 20px;
  padding: 16px 20px;
  border-radius: 16px;
  background: rgba(15, 23, 42, 0.6);
  border: 1px solid rgba(255, 255, 255, 0.03);
}

.note-title {
  font-size: 13px;
  font-weight: 700;
  color: #facc15;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.note ul {
  padding-left: 18px;
}

.note li {
  font-size: 13px;
  color: #94a3b8;
  margin-bottom: 6px;
  line-height: 1.6;
}

.note li::marker {
  color: #facc15;
}

.footer-divider {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  margin-top: 48px;
  margin-bottom: 16px;
}
.footer-line {
  height: 1px;
  width: 150px;
  background: linear-gradient(to right, transparent, rgba(255,255,255,0.1), transparent);
}
.footer-logo {
  color: #94a3b8;
  width: 16px;
  height: 16px;
  opacity: 0.5;
}
.credits {
  text-align: center;
  font-size: 12px;
  color: #64748b;
}
.credits a {
  color: #3b82f6;
  text-decoration: none;
}
</style>
</head>

<body>
<div class="blob top-left"></div>
<div class="blob bottom-right"></div>

<div class="topnav">
  <a href="index.html"><i data-lucide="arrow-left" style="width: 16px; height: 16px;"></i> Home</a>
  <div class="title">EMSKK SYSTEM</div>
</div>

<div class="container">

  <div class="header">
    <h1><span class="white">EMSKK SYSTEM</span> <span class="gradient">TUTORIAL</span></h1>
    <p>Panduan penggunaan Attendance & Invoice System</p>
  </div>

  <div id="tutorial-cards-container"></div>

  <div class="footer-divider">
    <div class="footer-line"></div>
    <i data-lucide="aperture" class="footer-logo"></i>
    <div class="footer-line"></div>
  </div>
  <div class="credits">System by <a href="#">Samuel</a></div>

</div>

<script>
const tutorialData = [
  {
    key: "attendance",
    icon: "clock",
    title: "1. Attendance",
    steps: [
      "Pilih atau Tulis Nama EMS (Jabatan & Divisi terisi otomatis)",
      "Klik <span class='highlight'>START DUTY</span> → ON DUTY (cukup 1x klik)",
      "Klik <span class='highlight'>FINISH DUTY</span> → OFF DUTY (cukup 1x klik)",
      "Data durasi duty otomatis tersimpan"
    ],
    note: {
      title: "Catatan",
      items: [
        "Sistem menggunakan zona waktu WIB (UTC+7), durasi kerja dihitung otomatis dari START → FINISH",
        "Apabila melamun diharapkan OFF DUTY",
        "Setelah ON DUTY, browser boleh ditutup, dan timer akan tetap berjalan",
        "Jika terlambat ON DUTY atau lupa OFF DUTY silakan hubungi FINANCE"
      ]
    }
  },
  {
    key: "attendance-overview",
    icon: "bar-chart-3",
    title: "2. Attendance Overview",
    steps: [
      "Filter berdasarkan Nama EMS",
      "Total jam kerja minggu ini",
      "Total jam kerja bulan ini",
      "Waktu duty terakhir",
      "Detail start & finish"
    ],
    note: null
  },
  {
    key: "invoice-input",
    icon: "credit-card",
    title: "3. Invoice Input",
    steps: [
      "Pilih atau Tulis Nama EMS (Jabatan & Divisi terisi otomatis)",
      "Isi invoice",
      "Pilih jenis invoice",
      "Isi harga & qty (Khusus Operasi, Surat, Lain-lain)",
      "Upload link bukti invoice",
      "Simpan invoice"
    ],
    note: {
      title: "Catatan",
      items: [
        "Link bukti wajib berupa link attachment resmi Discord (domain cdn atau media)",
        "Format harga tanpa titik (contoh: 200000)",
        "Kesalahan input invoice silakan hubungi FINANCE"
      ]
    }
  },
  {
    key: "invoice-overview",
    icon: "trending-up",
    title: "4. Invoice Overview",
    steps: [
      "Filter berdasarkan Nama EMS",
      "Lihat total minggu ini",
      "Lihat jumlah invoice",
      "Lihat upload terakhir"
    ],
    note: null
  }
];

function renderTutorialCards() {
  const container = document.getElementById("tutorial-cards-container");
  
  const cardsHtml = tutorialData.map(card => {
    const stepsHtml = card.steps.map(step => `<li>${step}</li>`).join("");
    
    let noteHtml = "";
    if (card.note) {
      const noteItemsHtml = card.note.items.map(item => `<li>${item}</li>`).join("");
      noteHtml = `
        <div class="note">
          <div class="note-title"><i data-lucide="lightbulb" style="width:16px; height:16px;"></i> ${card.note.title}</div>
          <ul>${noteItemsHtml}</ul>
        </div>
      `;
    }
    
    return `
      <div class="card ${card.key}">
        <h2><i data-lucide="${card.icon}" style="width:20px; height:20px;"></i> ${card.title}</h2>
        <ul>${stepsHtml}</ul>
        ${noteHtml}
      </div>
    `;
  }).join("");

  container.innerHTML = cardsHtml;
  
  if (window.lucide) {
    lucide.createIcons();
  }
}

document.addEventListener("DOMContentLoaded", renderTutorialCards);
</script>
</body>
</html>

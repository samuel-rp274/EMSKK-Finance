<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EMS Attendance</title>

<link href="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/css/tom-select.css" rel="stylesheet">

<style>
:root{
  --bg:#0f172a;
  --card:#1e293b;
  --input:#334155;
  --text:#f8fafc;
  --muted:#94a3b8;
  --green:#22c55e;
  --red:#ef4444;
  --blue:#38bdf8;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial;
}

body{
  background:var(--bg);
  color:var(--text);
  display:flex;
  justify-content:center;
  padding:30px;
}

.container{
  width:420px;
}

.card{
  background:linear-gradient(145deg,#1e293b,#0f172a);
  border:1px solid #1f2a44;
  border-radius:18px;
  padding:24px;
}

h1{
  text-align:center;
  margin-bottom:5px;
}

.subtitle{
  text-align:center;
  color:var(--muted);
  margin-bottom:18px;
}

/* CLOCK */
.clock-box{
  text-align:center;
  margin-bottom:18px;
  padding:18px;
  background:#0b1220;
  border-radius:14px;
  border:1px solid #1f2a44;
}

.clock-time{
  font-size:40px;
  font-weight:800;
  color:var(--blue);
}

.clock-date{
  font-size:13px;
  margin-top:6px;
  color:var(--muted);
}

input, select{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:12px;
  background:var(--input);
  color:white;
}

button{
  width:100%;
  padding:12px;
  margin-top:12px;
  border:none;
  border-radius:12px;
  font-weight:700;
  cursor:pointer;
  transition:.2s;
}

button:disabled{
  opacity:0.4;
  cursor:not-allowed;
}

.start{ background:var(--green); }
.finish{ background:var(--red); }

.status{
  text-align:center;
  margin-top:14px;
  color:var(--muted);
}
</style>
</head>

<body>

<div class="container">
<div class="card">

<h1>EMS ABSENSI</h1>
<div class="subtitle">On Duty Tracking System</div>

<!-- CLOCK -->
<div class="clock-box">
  <div class="clock-time" id="clock-time">00:00:00</div>
  <div class="clock-date" id="clock-date">loading...</div>
</div>

<!-- EMS -->
<select id="nama" placeholder="Cari Nama EMS..."></select>

<input id="jabatan" placeholder="Jabatan" readonly>
<input id="divisi" placeholder="Divisi" readonly>

<button class="start" id="btnStart" onclick="startDuty()">START DUTY</button>
<button class="finish" id="btnFinish" onclick="finishDuty()">FINISH DUTY</button>

<div class="status" id="status">Status: -</div>

</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/js/tom-select.complete.min.js"></script>

<script>

const API = "https://script.google.com/macros/s/YOUR_SCRIPT/exec";

let emsData = {};
let currentStatus = "OFF";
let tomSelect;

const nama = document.getElementById("nama");
const jabatan = document.getElementById("jabatan");
const divisi = document.getElementById("divisi");
const status = document.getElementById("status");

// ================= CLOCK FIX =================
function updateClock(){
  const now = new Date();

  document.getElementById("clock-time").textContent =
    now.toLocaleTimeString("id-ID",{timeZone:"Asia/Jakarta",hour12:false});

  document.getElementById("clock-date").textContent =
    now.toLocaleDateString("id-ID",{weekday:"long",year:"numeric",month:"long",day:"numeric"});
}

document.addEventListener("DOMContentLoaded",()=>{
  updateClock();
  setInterval(updateClock,1000);
});

// ================= LOAD EMS =================
async function loadEMS(){
  const res = await fetch(API + "?action=getEMS");
  const data = await res.json();

  const select = document.getElementById("nama");

  data.forEach(item=>{
    emsData[item.nama] = {
      jabatan:item.jabatan,
      divisi:item.divisi
    };

    const opt = document.createElement("option");
    opt.value = item.nama;
    opt.textContent = item.nama;
    select.appendChild(opt);
  });

  tomSelect = new TomSelect("#nama",{
    placeholder:"Cari Nama EMS...",
    create:false,
    sortField:{field:"text",direction:"asc"}
  });
}

// ================= CHECK STATUS =================
async function checkStatus(nama){
  const res = await fetch(API + "?action=checkDutyStatus&nama=" + encodeURIComponent(nama));
  const data = await res.json();

  currentStatus = data.status;

  updateButtons();
}

// ================= BUTTON CONTROL =================
function updateButtons(){
  const startBtn = document.getElementById("btnStart");
  const finishBtn = document.getElementById("btnFinish");

  if(currentStatus === "ON"){
    startBtn.disabled = true;
    finishBtn.disabled = false;
  }else{
    startBtn.disabled = false;
    finishBtn.disabled = true;
  }
}

// ================= ON CHANGE EMS =================
document.getElementById("nama").addEventListener("change",(e)=>{
  const val = e.target.value;

  jabatan.value = emsData[val]?.jabatan || "";
  divisi.value = emsData[val]?.divisi || "";

  if(val){
    checkStatus(val);
  }
});

// ================= START DUTY =================
async function startDuty(){

  const val = document.getElementById("nama").value;
  if(!val) return;

  if(currentStatus === "ON"){
    status.textContent = "Sudah ON DUTY";
    return;
  }

  const res = await fetch(API + "?action=startDuty&nama=" + encodeURIComponent(val));
  const data = await res.json();

  if(data.success){
    currentStatus = "ON";
    updateButtons();
  }

  status.textContent = data.message;
}

// ================= FINISH DUTY =================
async function finishDuty(){

  const val = document.getElementById("nama").value;
  if(!val) return;

  if(currentStatus === "OFF"){
    status.textContent = "Belum START DUTY";
    return;
  }

  const res = await fetch(API + "?action=finishDuty&nama=" + encodeURIComponent(val));
  const data = await res.json();

  if(data.success){
    currentStatus = "OFF";
    updateButtons();
  }

  status.textContent = data.message;
}

// INIT
loadEMS();

</script>

</body>
</html>
